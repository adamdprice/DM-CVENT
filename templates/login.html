<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in - DM Cvent</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --error: #ef4444;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1rem;
    }
    .card {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.2rem; }
    .hint { margin: 0 0 1rem; color: var(--muted); font-size: 0.92rem; }
    label { display: block; margin: 0 0 0.35rem; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 0.65rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1117;
      color: var(--text);
      margin-bottom: 0.9rem;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      padding: 0.7rem 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button[disabled] { opacity: 0.7; cursor: not-allowed; }
    .error {
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 8px;
      padding: 0.6rem 0.7rem;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
    }
    .link-btn {
      margin-top: 0.7rem;
      width: auto;
      background: transparent;
      color: var(--muted);
      text-decoration: underline;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DM Cvent Sign in</h1>
    <p class="hint">Enter your email to receive a one-time code.</p>
    <div id="error" class="error" hidden></div>

    <div id="email-step">
      <form id="send-form">
        <label for="email">Email address</label>
        <input id="email" type="email" required autocomplete="email" placeholder="you@example.com" />
        <button id="send-btn" type="submit">Send code</button>
      </form>
    </div>

    <div id="code-step" hidden>
      <p class="hint">Code sent to <strong id="code-email"></strong>.</p>
      <form id="verify-form">
        <label for="code">6-digit code</label>
        <input id="code" type="text" required maxlength="6" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" />
        <button id="verify-btn" type="submit">Verify and sign in</button>
      </form>
      <button id="back-btn" class="link-btn" type="button">Use a different email</button>
    </div>
  </div>

  <script>
    (function() {
      var err = document.getElementById("error");
      var emailStep = document.getElementById("email-step");
      var codeStep = document.getElementById("code-step");
      var sendForm = document.getElementById("send-form");
      var verifyForm = document.getElementById("verify-form");
      var emailInput = document.getElementById("email");
      var codeInput = document.getElementById("code");
      var codeEmail = document.getElementById("code-email");
      var backBtn = document.getElementById("back-btn");

      function showError(msg) {
        err.textContent = msg || "";
        err.hidden = !msg;
      }

      fetch("/api/auth/methods", { credentials: "same-origin" })
        .then(function(r) { return r.json(); })
        .then(function(methods) {
          if (!methods.email_code) {
            showError("Email sign-in is not configured for this environment.");
            document.getElementById("send-btn").disabled = true;
            emailInput.disabled = true;
          }
        })
        .catch(function() {
          showError("Could not load sign-in options.");
        });

      sendForm.addEventListener("submit", function(e) {
        e.preventDefault();
        showError("");
        var btn = document.getElementById("send-btn");
        btn.disabled = true;
        var email = emailInput.value.trim().toLowerCase();
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, 20000);
        fetch("/api/auth/send-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ email: email }),
          signal: controller.signal
        })
          .then(function(r) {
            if (r.ok) {
              codeEmail.textContent = email;
              emailStep.hidden = true;
              codeStep.hidden = false;
              codeInput.value = "";
              codeInput.focus();
              return;
            }
            return r.json().then(function(d) { showError((d && d.error) || "Failed to send code"); });
          })
          .catch(function(err) {
            if (err && err.name === "AbortError") {
              showError("Request timed out while sending code. Check SMTP settings and try again.");
              return;
            }
            showError("Failed to send code");
          })
          .finally(function() {
            clearTimeout(timeout);
            btn.disabled = false;
          });
      });

      verifyForm.addEventListener("submit", function(e) {
        e.preventDefault();
        showError("");
        var btn = document.getElementById("verify-btn");
        btn.disabled = true;
        fetch("/api/auth/verify-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            email: emailInput.value.trim().toLowerCase(),
            code: codeInput.value.trim()
          })
        })
          .then(function(r) {
            if (r.ok) {
              window.location.href = "/events";
              return;
            }
            return r.json().then(function(d) { showError((d && d.error) || "Invalid code"); });
          })
          .catch(function() { showError("Verification failed"); })
          .finally(function() { btn.disabled = false; });
      });

      backBtn.addEventListener("click", function() {
        showError("");
        codeStep.hidden = true;
        emailStep.hidden = false;
        emailInput.focus();
      });
    })();
  </script>
</body>
</html>
